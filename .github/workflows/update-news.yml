name: Update real estate news

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: update-real-estate-news
  cancel-in-progress: false

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Update data
        run: npm run update
        env:
          LOOKBACK_DAYS: "45"
          RSSHUB_BASE: ${{ vars.RSSHUB_BASE || 'https://rsshub.app' }}
          CLS_RSS_URLS: ${{ vars.CLS_RSS_URLS || '' }}
          GUANDIAN_RSS_URLS: ${{ vars.GUANDIAN_RSS_URLS || '' }}

      - name: Commit updated data
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update real estate news data"
          file_pattern: data/news.json data/archive/*.json

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
